<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Engage Settings — Clickable Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #fafafa;
    --bg-elevated: #ffffff;
    --bg-muted: #f5f5f5;
    --bg-subtle: #f9fafb;
    --border: #e5e7eb;
    --border-strong: #d1d5db;
    --border-focus: #6366f1;
    --text: #0a0a0a;
    --text-secondary: #4b5563;
    --text-muted: #6b7280;
    --text-faint: #9ca3af;
    --primary: #4f46e5;
    --success: #16a34a;
    --success-bg: #f0fdf4;
    --success-border: #bbf7d0;
    --success-pill-bg: #dcfce7;
    --warning: #d97706;
    --warning-bg: #fffbeb;
    --warning-border: #fde68a;
    --danger: #dc2626;
    --danger-bg: #fef2f2;
    --danger-border: #fecaca;
    --info: #2563eb;
    --info-bg: #eff6ff;
    --info-border: #bfdbfe;
    --radius: 8px;
    --radius-lg: 12px;
    --radius-sm: 6px;
    --shadow-card: 0 1px 2px rgba(15, 23, 42, 0.04);
    --shadow-modal: 0 24px 48px rgba(15, 23, 42, 0.18);
    --font-sans: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --font-mono: "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    color: var(--text);
    background: #ececec;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
  }

  .back-link {
    position: fixed; top: 12px; left: 12px; z-index: 9999;
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 500;
    color: #64748b; background: white; border: 1px solid #e2e8f0;
    padding: 5px 11px; border-radius: 6px; text-decoration: none;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .back-link:hover { color: #1e293b; background: #f8fafc; }

  .stage {
    max-width: 1180px;
    margin: 0 auto;
    padding: 56px 24px;
  }

  /* ============================================== */
  /* SHELL — settings flavor (no top stepper)       */
  /* ============================================== */
  .shell {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    display: grid;
    grid-template-rows: auto 1fr;
    min-height: 720px;
    box-shadow: var(--shadow-card);
  }
  .shell-topbar {
    border-bottom: 1px solid var(--border);
    padding: 22px 36px 22px;
    background: var(--bg-elevated);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .shell-title h1 {
    font-size: 17px;
    font-weight: 600;
    margin: 0 0 2px;
    letter-spacing: -0.01em;
  }
  .shell-title p {
    font-size: 12.5px;
    color: var(--text-muted);
    margin: 0;
  }
  .close-btn {
    color: var(--text-muted);
    background: transparent;
    border: 0;
    cursor: pointer;
    padding: 4px;
  }
  .close-btn:hover { color: var(--text); }

  .shell-body {
    display: grid;
    grid-template-columns: 240px 1fr;
    min-height: 0;
  }
  .shell-body[data-mode="byo"] {
    grid-template-columns: 240px 1fr;
  }

  .shell-sidebar {
    border-right: 1px solid var(--border);
    background: var(--bg-subtle);
    padding: 24px 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .shell-sidebar-eyebrow {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-faint);
    padding: 0 12px 10px;
  }
  .shell-sidebar-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    font-size: 13.5px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    background: transparent;
    border: 0;
    text-align: left;
    width: 100%;
    font-family: inherit;
  }
  .shell-sidebar-item:hover { background: rgba(15, 23, 42, 0.04); }
  .shell-sidebar-item[data-state="active"] {
    background: var(--bg-elevated);
    color: var(--text);
    font-weight: 600;
    box-shadow: var(--shadow-card);
  }

  .shell-sidebar-parent {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    font-size: 13.5px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    background: transparent;
    border: 0;
    text-align: left;
    width: 100%;
    font-family: inherit;
  }
  .shell-sidebar-parent:hover { background: rgba(15, 23, 42, 0.04); }
  .shell-sidebar-parent svg { color: var(--text-muted); }
  .shell-sidebar-substeps {
    list-style: none;
    margin: 4px 0 0;
    padding: 0 0 0 22px;
    border-left: 1px dashed var(--border-strong);
    margin-left: 22px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .shell-sidebar-substeps li {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 12px;
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-size: 13px;
  }
  .shell-sidebar-substeps li[data-state="active"] {
    background: var(--bg-elevated);
    color: var(--text);
    font-weight: 500;
    box-shadow: var(--shadow-card);
  }
  .shell-sidebar-substeps li[data-state="complete"] { color: var(--text); }
  .shell-sidebar-substep-marker {
    width: 16px;
    height: 16px;
    border-radius: 999px;
    background: var(--bg-elevated);
    border: 1.5px solid var(--border-strong);
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 600;
    color: var(--text-faint);
  }
  .shell-sidebar-substeps li[data-state="active"] .shell-sidebar-substep-marker {
    border-color: var(--primary);
    background: var(--primary);
    color: white;
  }
  .shell-sidebar-substeps li[data-state="complete"] .shell-sidebar-substep-marker {
    border-color: var(--success);
    background: var(--success);
    color: white;
    font-size: 0;
  }
  .shell-sidebar-substeps li[data-state="complete"] .shell-sidebar-substep-marker::before {
    content: "✓";
    font-size: 9px;
    font-weight: 700;
  }

  .shell-main {
    overflow-y: auto;
    padding: 36px 48px 32px;
    max-width: 100%;
    min-height: 540px;
  }

  .page-header {
    margin-bottom: 28px;
  }
  .page-header h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0 0 6px;
  }
  .page-header p {
    margin: 0;
    color: var(--text-secondary);
    font-size: 14px;
    max-width: 640px;
  }

  /* ============================================== */
  /* COMMON                                         */
  /* ============================================== */
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 20px;
  }
  .form-group label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .form-group .helper {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: -2px;
  }
  .form-input {
    width: 100%;
    appearance: none;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    font: inherit;
    font-size: 14px;
    background: var(--bg-elevated);
    color: var(--text);
  }
  .form-input:focus {
    outline: none;
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.18);
  }

  .btn {
    appearance: none;
    border: 0;
    cursor: pointer;
    font: inherit;
    font-weight: 500;
    padding: 9px 18px;
    border-radius: var(--radius-sm);
    transition: background 120ms ease, border-color 120ms ease, opacity 120ms;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
  }
  .btn-primary { background: var(--text); color: white; }
  .btn-primary:hover:not(:disabled) { background: #1f2937; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary {
    background: var(--bg-elevated);
    color: var(--text);
    border: 1px solid var(--border-strong);
  }
  .btn-secondary:hover { border-color: var(--text); }
  .btn-ghost {
    background: transparent;
    color: var(--text-secondary);
    padding: 8px 12px;
  }
  .btn-ghost:hover { color: var(--text); }
  .btn-link {
    background: none; border: 0; color: var(--info);
    font-weight: 500; cursor: pointer; padding: 0;
    font-size: inherit;
  }
  .btn-link:hover { text-decoration: underline; }
  .btn-danger {
    background: var(--bg-elevated);
    color: var(--danger);
    border: 1px solid var(--danger-border);
  }
  .btn-danger:hover { background: var(--danger-bg); }

  /* Sender prefix split */
  .sender-prefix-row {
    display: flex;
    align-items: stretch;
  }
  .sender-prefix-row input {
    border-top-right-radius: 0;
    border-bottom-right-radius: 0;
    border-right: 0;
    max-width: 200px;
  }
  .sender-prefix-row .at-sign {
    display: inline-flex;
    align-items: center;
    padding: 0 10px;
    background: var(--bg-subtle);
    border: 1px solid var(--border-strong);
    border-left: 0;
    border-right: 0;
    color: var(--text-muted);
    font-size: 14px;
  }
  .sender-prefix-row .domain-suffix {
    display: inline-flex;
    align-items: center;
    padding: 0 12px;
    background: var(--bg-subtle);
    border: 1px solid var(--border-strong);
    border-top-left-radius: 0;
    border-bottom-left-radius: 0;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text-muted);
    flex: 1;
  }

  /* Inbox preview */
  .inbox-preview {
    background: var(--bg-subtle);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-top: 10px;
  }
  .inbox-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    background: var(--bg-elevated);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
  }
  .inbox-avatar {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    border-radius: 999px;
    background: linear-gradient(135deg, #14b8a6, #0d9488);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 12px;
  }
  .inbox-meta { flex: 1; min-width: 0; }
  .inbox-from {
    font-size: 12.5px;
    color: var(--text);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .inbox-via {
    font-weight: 400;
    color: var(--text-faint);
    font-size: 11.5px;
  }
  .inbox-subject {
    color: var(--text-muted);
    font-size: 12px;
    margin-top: 2px;
  }

  /* Section divider */
  .section-block {
    margin-bottom: 32px;
  }
  .section-block + .section-block {
    padding-top: 32px;
    border-top: 1px solid var(--border);
  }
  .section-block-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin: 0 0 14px;
  }
  .section-block-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 14px;
  }
  .section-block-header h3 {
    margin: 0;
    font-size: 14.5px;
    font-weight: 600;
  }

  /* Sticky save bar */
  .save-bar {
    position: sticky;
    bottom: 0;
    margin: 28px -48px -32px;
    padding: 14px 48px;
    background: var(--bg-elevated);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .save-bar .dirty-text {
    font-size: 12.5px;
    color: var(--text-muted);
  }

  /* Status pills */
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
    border: 1px solid transparent;
  }
  .status-pill::before {
    content: "";
    width: 6px;
    height: 6px;
    border-radius: 999px;
    background: currentColor;
  }
  .status-pending {
    background: var(--info-bg);
    color: #1e40af;
    border-color: var(--info-border);
  }
  .status-pending::before { animation: pulse 1.4s ease-in-out infinite; }
  .status-verified {
    background: var(--success-pill-bg);
    color: #166534;
    border-color: var(--success-border);
  }
  .status-disconnected {
    background: var(--danger-bg);
    color: #991b1b;
    border-color: var(--danger-border);
  }
  .status-managed {
    background: var(--bg-subtle);
    color: var(--text-secondary);
    border-color: var(--border);
  }
  @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

  /* Domain table */
  .domain-table {
    width: 100%;
    border-collapse: collapse;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--bg-elevated);
  }
  .domain-table th {
    text-align: left;
    padding: 11px 16px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-muted);
    background: var(--bg-subtle);
    border-bottom: 1px solid var(--border);
  }
  .domain-table td {
    padding: 16px;
    border-top: 1px solid var(--bg-subtle);
    vertical-align: middle;
    font-size: 13.5px;
  }
  .domain-table tr:first-child td { border-top: 0; }
  .domain-table .domain-name-cell {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .domain-table .domain-name-cell .name {
    font-family: var(--font-mono);
    font-size: 13.5px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .domain-table .domain-name-cell .purpose {
    font-size: 11.5px;
    color: var(--text-muted);
  }
  .default-badge {
    background: var(--bg-subtle);
    color: var(--text-secondary);
    padding: 1px 7px;
    border-radius: 999px;
    font-size: 10.5px;
    font-weight: 500;
    border: 1px solid var(--border);
    font-family: var(--font-sans);
  }
  .domain-table .actions {
    display: flex;
    gap: 6px;
    justify-content: flex-end;
  }
  .icon-btn {
    appearance: none;
    border: 1px solid var(--border);
    background: var(--bg-elevated);
    color: var(--text-secondary);
    cursor: pointer;
    padding: 6px;
    border-radius: var(--radius-sm);
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .icon-btn:hover { color: var(--text); border-color: var(--border-strong); }

  /* Disconnect banner */
  .disconnect-banner {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: var(--danger-bg);
    border: 1px solid var(--danger-border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 16px;
    color: #7f1d1d;
  }
  .disconnect-banner svg { color: var(--danger); flex-shrink: 0; margin-top: 2px; }
  .disconnect-banner h4 {
    margin: 0 0 4px;
    font-size: 13.5px;
    font-weight: 600;
    color: #7f1d1d;
  }
  .disconnect-banner p {
    margin: 0 0 8px;
    font-size: 12.5px;
    color: #991b1b;
  }
  .disconnect-banner code {
    font-family: var(--font-mono);
    font-size: 12px;
    background: rgba(127, 29, 29, 0.08);
    padding: 1px 5px;
    border-radius: 4px;
  }
  .disconnect-banner .actions {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }

  /* ============================================== */
  /* DNS CONNECTION SECTION (Voice-style splash/    */
  /* configured/disconnected/wizard inline)         */
  /* ============================================== */
  .dns-section {
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    background: var(--bg-elevated);
    overflow: hidden;
  }
  .dns-section[data-state="disconnected"] {
    border-color: var(--danger-border);
    background: var(--danger-bg);
  }
  .dns-section[data-state="pending"] {
    border-color: var(--info-border);
  }
  .dns-section[data-state="wizard"] {
    background: var(--bg-elevated);
  }

  .dns-section-header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid transparent;
  }
  .dns-section[data-state="wizard"] .dns-section-header {
    border-bottom-color: var(--border);
    background: var(--bg-subtle);
  }
  .dns-section-title {
    font-size: 13.5px;
    font-weight: 600;
    color: var(--text);
    margin: 0;
  }
  .dns-section[data-state="disconnected"] .dns-section-title {
    color: #7f1d1d;
  }
  .dns-section-icon {
    width: 28px;
    height: 28px;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .dns-section-icon[data-tone="success"] {
    background: var(--success-pill-bg);
    color: var(--success);
  }
  .dns-section-icon[data-tone="info"] {
    background: var(--info-bg);
    color: var(--info);
  }
  .dns-section-icon[data-tone="warning"] {
    background: var(--warning-bg);
    color: var(--warning);
  }
  .dns-section-icon[data-tone="danger"] {
    background: white;
    color: var(--danger);
    border: 1.5px solid var(--danger-border);
  }
  .dns-section-icon[data-tone="muted"] {
    background: var(--bg-subtle);
    color: var(--text-secondary);
  }

  .dns-section-cancel {
    margin-left: auto;
    appearance: none;
    border: 0;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px;
    font-size: 12.5px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .dns-section-cancel:hover { color: var(--text); }

  .dns-section-body {
    padding: 20px;
  }
  .dns-section-body p {
    margin: 0;
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.55;
  }
  .dns-section[data-state="disconnected"] .dns-section-body p {
    color: #991b1b;
  }
  .dns-section-body p + p { margin-top: 8px; }
  .dns-section-body code {
    font-family: var(--font-mono);
    font-size: 12px;
    background: var(--bg-subtle);
    padding: 1px 5px;
    border-radius: 4px;
  }
  .dns-section[data-state="disconnected"] .dns-section-body code {
    background: rgba(127, 29, 29, 0.08);
  }
  .dns-section-actions {
    margin-top: 16px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  /* Configured-state metadata grid */
  .dns-meta {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 8px 16px;
    margin-top: 12px;
    font-size: 12.5px;
  }
  .dns-meta dt {
    color: var(--text-muted);
    margin: 0;
  }
  .dns-meta dd {
    color: var(--text);
    margin: 0;
    font-family: var(--font-mono);
    font-size: 12px;
  }

  /* Inline wizard within the DNS section */
  .dns-wizard {
    display: grid;
    grid-template-columns: 200px 1fr;
    min-height: 380px;
  }
  .dns-wizard-sidebar {
    background: var(--bg-subtle);
    border-right: 1px solid var(--border);
    padding: 18px 12px;
  }
  .dns-wizard-sidebar-eyebrow {
    font-size: 10.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-faint);
    padding: 0 10px 8px;
  }
  .dns-wizard-sidebar ul {
    list-style: none;
    margin: 4px 0 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .dns-wizard-sidebar li {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 10px;
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-size: 12.5px;
  }
  .dns-wizard-sidebar li[data-state="active"] {

  <div class="demo-switcher-label">Demo state</div>
  <div class="demo-switcher-options" id="demoSwitcher"></div>
</div>

<script>
/* =========================================================
   STATE
   ========================================================= */
const state = {
  // Active settings tab
  tab: 'email-channel',

  // BYO sub-journey (only relevant when in Email Channel)
  byo: {
    // 'in-progress' | null
    subStep: null,
    rootDomain: 'muskingumcofair.com',
    subdomain: 'send',
    dmarcOn: true,
    paused: false,
    pausedAt: null,
    verifyProgress: 0,
    isVerifying: false,
    // Whether this BYO sub-journey is for an EXISTING domain on the detail
    // page (inline DNS wizard) vs ADDING a new domain (full-page navigation
    // from list view). When inlineForDomainId is set, the sub-flow renders
    // inside the DNS section of that domain's detail page.
    inlineForDomainId: null,
  },

  // Account-level email metadata (used as defaults when adding new domains)
  email: {
    managedDomain: 'muskingum-county-fair.fairs-mail.com',
  },

  // Master→detail nav within Email Channel: null = list view, otherwise a domain id
  selectedDomainId: null,

  // Pending edits for the currently-open domain detail page (so we can show a
  // sticky save bar scoped to that domain only)
  pendingEdits: null, // { domainId, prefix, displayName, replyTo }

  // Domains list (entry state: 1 verified BYO + always-present managed row)
  // Each domain owns its OWN sender identity (prefix, displayName, replyTo)
  domains: [
    {
      id: 'send',
      fullDomain: 'send.muskingumcofair.com',
      purpose: 'Marketing',
      status: 'verified',
      lastVerified: '2 min ago',
      isDefault: true,
      isManaged: false,
      prefix: 'marketing',
      displayName: 'Muskingum County Fair',
      replyTo: 'info@muskingumcofair.com',
    },
    {
      id: 'managed',
      fullDomain: 'muskingum-county-fair.fairs-mail.com',
      purpose: 'Managed domain · always available',
      status: 'managed',
      lastVerified: null,
      isDefault: false,
      isManaged: true,
      prefix: 'marketing',
      displayName: 'Muskingum County Fair',
      replyTo: 'info@muskingumcofair.com',
    },
  ],

  // Demo scenario
  demoScenario: 'verified-1',

  // Modals
  showEntriModal: false,
  confirmModal: null, // { title, body, confirmLabel, onConfirm }

  // Toast
  toast: null,

  dirty: false, // for save bar visibility
};

const SETTINGS_TABS = [
  { key: 'brand', label: 'Brand Settings' },
  { key: 'business', label: 'Business Information' },
  { key: 'email-channel', label: 'Email Channel' },
  { key: 'sms', label: 'SMS Channel' },
  { key: 'merge-fields', label: 'Merge Fields' },
];

const BYO_SUBSTEPS = [
  { key: 'root', label: 'Root domain' },
  { key: 'subdomain', label: 'Subdomain' },
  { key: 'dmarc', label: 'DMARC' },
  { key: 'connect', label: 'Connect' },
];

const DEMO_SCENARIOS = [
  { key: 'verified-1', label: '1 verified' },
  { key: 'verified-2', label: '2 verified' },
  { key: 'pending', label: 'Verifying' },
  { key: 'disconnected', label: 'Disconnected' },
  { key: 'managed-only', label: 'Managed only' },
];

/* =========================================================
   DEMO SCENARIO LOADER
   ========================================================= */
function loadDemoScenario(key) {
  state.demoScenario = key;
  state.tab = 'email-channel';
  state.selectedDomainId = null;
  state.pendingEdits = null;
  state.byo = { subStep: null, rootDomain: 'muskingumcofair.com', subdomain: 'send', dmarcOn: true, paused: false, pausedAt: null, verifyProgress: 0, isVerifying: false, inlineForDomainId: null };

  // Default identity used for all baseline domains in demo scenarios
  const defaultIdentity = (prefix) => ({
    prefix,
    displayName: 'Muskingum County Fair',
    replyTo: 'info@muskingumcofair.com',
  });

  const managed = {
    id: 'managed',
    fullDomain: 'muskingum-county-fair.fairs-mail.com',
    purpose: 'Managed domain · always available',
    status: 'managed',
    lastVerified: null,
    isDefault: false,
    isManaged: true,
    ...defaultIdentity('marketing'),
  };

  if (key === 'verified-1') {
    state.domains = [
      { id: 'send', fullDomain: 'send.muskingumcofair.com', purpose: 'Marketing', status: 'verified', lastVerified: '2 min ago', isDefault: true, isManaged: false, ...defaultIdentity('marketing') },
      managed,
    ];
  } else if (key === 'verified-2') {
    state.domains = [
      { id: 'send', fullDomain: 'send.muskingumcofair.com', purpose: 'Marketing', status: 'verified', lastVerified: '2 hr ago', isDefault: true, isManaged: false, ...defaultIdentity('marketing') },
      { id: 'notif', fullDomain: 'notifications.muskingumcofair.com', purpose: 'Transactional', status: 'verified', lastVerified: '1 day ago', isDefault: false, isManaged: false, prefix: 'noreply', displayName: 'Muskingum County Fair Tickets', replyTo: 'support@muskingumcofair.com' },
      managed,
    ];
  } else if (key === 'pending') {
    state.domains = [
      { id: 'send', fullDomain: 'send.muskingumcofair.com', purpose: 'Marketing · Verifying 1 of 3 records', status: 'pending', lastVerified: null, isDefault: true, isManaged: false, ...defaultIdentity('marketing') },
      managed,
    ];
    // Show a meaningful midway state in the DNS section: DKIM verified, Return-Path checking, DMARC pending
    state.byo.verifyProgress = 1;
  } else if (key === 'disconnected') {
    state.domains = [
      { id: 'send', fullDomain: 'send.muskingumcofair.com', purpose: 'Marketing · DKIM record missing', status: 'disconnected', lastVerified: '3 days ago', isDefault: true, isManaged: false, ...defaultIdentity('marketing') },
      { id: 'notif', fullDomain: 'notifications.muskingumcofair.com', purpose: 'Transactional', status: 'verified', lastVerified: '2 hr ago', isDefault: false, isManaged: false, prefix: 'noreply', displayName: 'Muskingum County Fair Tickets', replyTo: 'support@muskingumcofair.com' },
      managed,
    ];
  } else if (key === 'managed-only') {
    state.domains = [managed];
  }
  render();
}

/* =========================================================
   NAVIGATION
   ========================================================= */
function setTab(key) {
  state.tab = key;
  state.byo.subStep = null;
  state.selectedDomainId = null;
  state.pendingEdits = null;
  render();
}

/* =========================================================
   DOMAIN ACTIONS
   ========================================================= */
function startAddDomain() {
  state.byo.subStep = 'root';
  state.byo.subdomain = state.domains.length === 1 ? 'send' : 'notifications';
  state.byo.paused = false;
  render();
}

function reverify(id) {
  state.toast = { kind: 'info', text: 'Re-checking DNS records…' };
  render();
  setTimeout(() => {
    const d = state.domains.find(x => x.id === id);
    if (d) {
      d.status = 'verified';
      d.lastVerified = 'just now';
      d.purpose = d.purpose.replace(' · DKIM record missing', '').replace(/ · Verifying.*$/, '');
    }
    state.toast = { kind: 'success', text: 'Verified successfully.' };
    render();
    setTimeout(() => { state.toast = null; render(); }, 2400);
  }, 1400);
}

function setDefault(id) {
  state.domains.forEach(d => { d.isDefault = (d.id === id); });
  state.toast = { kind: 'success', text: 'Default domain updated.' };
  render();
  setTimeout(() => { state.toast = null; render(); }, 2400);
}

function confirmRemove(id) {
  const d = state.domains.find(x => x.id === id);
  if (!d) return;
  state.confirmModal = {
    title: `Remove ${d.fullDomain}?`,
    body: `This deletes the domain from your ESP and removes its records from your settings. ${d.isDefault ? 'Another domain will be promoted to default.' : ''}`,
    confirmLabel: 'Remove domain',
    onConfirm: () => {
      const wasDefault = d.isDefault;
      state.domains = state.domains.filter(x => x.id !== id);
      if (wasDefault) {
        const next = state.domains.find(x => !x.isManaged);
        if (next) next.isDefault = true;
      }
      // If we removed the domain we were viewing in detail, pop back to the list
      if (state.selectedDomainId === id) {
        state.selectedDomainId = null;
        state.pendingEdits = null;
      }
      state.confirmModal = null;
      state.toast = { kind: 'success', text: `${d.fullDomain} removed.` };
      render();
      setTimeout(() => { state.toast = null; render(); }, 2400);
    },
  };
  render();
}

function reconnectDisconnected(id) {
  const d = state.domains.find(x => x.id === id);
  if (!d) return;
  // Re-launch the connect flow inline on the domain detail page (Voice pattern).
  // Pre-populates subdomain/root from the existing domain so the user starts
  // already inside the wizard at sub-step 1 with their values filled in.
  state.byo.subdomain = d.fullDomain.split('.')[0];
  state.byo.rootDomain = d.fullDomain.split('.').slice(1).join('.');
  state.byo.subStep = 'root';
  state.byo.dmarcOn = true;
  state.byo.inlineForDomainId = id;
  state.byo.paused = false;
  state.byo.pausedAt = null;
  // Make sure the user is on this domain's detail page so the inline wizard renders
  state.selectedDomainId = id;
  render();
}

/* Start the inline DNS wizard from the detail page's DNS splash CTA.
   Used when the user is on a domain detail page that has no DNS connection yet
   (today, only the managed domain when shown in 'splash' state — but reserved
   for any future scenario where a row exists without DNS connection started). */
function startInlineDnsWizard(domainId) {
  const d = state.domains.find(x => x.id === domainId);
  if (!d) return;
  state.byo.subdomain = 'send';
  state.byo.rootDomain = 'muskingumcofair.com';
  state.byo.subStep = 'root';
  state.byo.dmarcOn = true;
  state.byo.inlineForDomainId = domainId;
  state.byo.paused = false;
  state.byo.pausedAt = null;
  state.selectedDomainId = domainId;
  render();
}

/* Cancel the inline DNS wizard — drops back to whatever the section's
   pre-wizard state was (configured, disconnected, splash). Does NOT
   navigate away from the detail page. */
function cancelInlineDnsWizard() {
  state.byo.subStep = null;
  state.byo.inlineForDomainId = null;
  state.byo.isVerifying = false;
  state.byo.verifyProgress = 0;
  state.byo.paused = false;
  state.byo.pausedAt = null;
  render();
}

/* Disconnect a verified domain — sets status to disconnected and shows
   the disconnected-state DNS section. Confirmation modal first. */
function confirmDisconnect(id) {
  const d = state.domains.find(x => x.id === id);
  if (!d) return;
  state.confirmModal = {
    title: `Disconnect ${d.fullDomain}?`,
    body: `Outbound mail will fall back to the managed domain until DNS is reconnected. The domain row stays in your list — you can reconnect anytime from this page.`,
    confirmLabel: 'Disconnect DNS',
    onConfirm: () => {
      d.status = 'disconnected';
      d.lastVerified = 'just now';
      d.purpose = d.purpose.split(' · ')[0] + ' · DKIM record missing';
      state.confirmModal = null;
      state.toast = { kind: 'info', text: `${d.fullDomain} disconnected.` };
      render();
      setTimeout(() => { state.toast = null; render(); }, 2400);
    },
  };
  render();
}

/* =========================================================
   BYO SUB-JOURNEY
   ========================================================= */
function byoNext() {
  const order = BYO_SUBSTEPS.map(s => s.key);
  const idx = order.indexOf(state.byo.subStep);
  if (idx === order.length - 1) {
    state.showEntriModal = true;
  } else {
    state.byo.subStep = order[idx + 1];
  }
  render();
}

function byoBack() {
  const order = BYO_SUBSTEPS.map(s => s.key);
  const idx = order.indexOf(state.byo.subStep);
  if (idx === 0) {
    // Inline DNS wizard cancels back to the section; full-page wizard pauses on the parent
    if (state.byo.inlineForDomainId) {
      cancelInlineDnsWizard();
    } else {
      exitBYOPaused();
    }
  } else {
    state.byo.subStep = order[idx - 1];
    render();
  }
}

function exitBYOPaused() {
  if (state.byo.subStep) {
    state.byo.paused = true;
    state.byo.pausedAt = state.byo.subStep;
  }
  state.byo.subStep = null;
  render();
}

function entriSuccess() {
  state.showEntriModal = false;

  // Inline DNS wizard on an existing domain — mutate that domain in place
  if (state.byo.inlineForDomainId) {
    const d = state.domains.find(x => x.id === state.byo.inlineForDomainId);
    if (d) {
      d.status = 'pending';
      d.purpose = d.purpose.replace(' · DKIM record missing', '');
      state.byo.isVerifying = true;
      state.byo.verifyProgress = 0;
      state.byo.subStep = null;
      animateVerification(d.id);
    }
    render();
    return;
  }

  // Legacy reconnect path (kept for safety; should be unused now that
  // reconnectDisconnected goes through the inline wizard)
  if (state.byo.reconnectingId) {
    const d = state.domains.find(x => x.id === state.byo.reconnectingId);
    if (d) {
      d.status = 'pending';
      d.purpose = d.purpose.replace(' · DKIM record missing', '');
      state.byo.isVerifying = true;
      state.byo.verifyProgress = 0;
      animateVerification(state.byo.reconnectingId);
    }
    state.byo.reconnectingId = null;
    render();
    return;
  }

  // New domain being added — inherits sender identity from the managed domain
  state.byo.isVerifying = true;
  state.byo.verifyProgress = 0;
  state.byo.subStep = null;
  const managedDomain = state.domains.find(d => d.isManaged);
  const inheritedIdentity = managedDomain
    ? { prefix: managedDomain.prefix, displayName: managedDomain.displayName, replyTo: managedDomain.replyTo }
    : { prefix: 'marketing', displayName: '', replyTo: '' };
  const newDomain = {
    id: state.byo.subdomain + '-' + Date.now(),
    fullDomain: state.byo.subdomain + '.' + state.byo.rootDomain,
    purpose: state.domains.filter(d => !d.isManaged).length === 0 ? 'Marketing' : 'Transactional',
    status: 'pending',
    lastVerified: null,
    isDefault: state.domains.filter(d => !d.isManaged).length === 0,
    isManaged: false,
    ...inheritedIdentity,
  };
  // Insert before managed
  const managedIdx = state.domains.findIndex(d => d.isManaged);
  state.domains.splice(managedIdx, 0, newDomain);
  animateVerification(newDomain.id);
  render();
}

function animateVerification(domainId) {
  setTimeout(() => { state.byo.verifyProgress = 1; render(); }, 1800);
  setTimeout(() => { state.byo.verifyProgress = 2; render(); }, 3600);
  setTimeout(() => {
    state.byo.verifyProgress = 3;
    state.byo.isVerifying = false;
    state.byo.inlineForDomainId = null; // clear inline-wizard flag once verified
    const d = state.domains.find(x => x.id === domainId);
    if (d) {
      d.status = 'verified';
      d.lastVerified = 'just now';
      d.purpose = d.purpose.split(' · ')[0]; // strip status suffix
    }
    state.toast = { kind: 'success', text: `${d ? d.fullDomain : 'Domain'} verified.` };
    render();
    setTimeout(() => { state.toast = null; render(); }, 2800);
  }, 5400);
}

function entriClose() {
  state.showEntriModal = false;
  if (state.byo.reconnectingId) {
    state.byo.reconnectingId = null;
  }
  render();
}

function dismissResume() {
  state.byo.paused = false;
  state.byo.pausedAt = null;
  state.byo.subStep = null;
  render();
}

function resumeBYO() {
  state.byo.subStep = state.byo.pausedAt;
  state.byo.paused = false;
  render();
}

/* DNS connection section — Voice-style splash/configured/disconnected/wizard.
   Returns one of four variants based on the domain's state and whether the
   inline wizard is currently open for THIS domain. */
function renderDnsSection(d) {
  // Inline wizard takes precedence over any other state
  const isInlineWizardForThis = state.byo.inlineForDomainId === d.id && state.byo.subStep;
  const isInlineVerifyingForThis = state.byo.inlineForDomainId === d.id && state.byo.isVerifying;

  if (isInlineWizardForThis) return renderDnsSectionWizard(d);
  if (isInlineVerifyingForThis) return renderDnsSectionVerifying(d);

  if (d.isManaged) return renderDnsSectionManaged(d);
  if (d.status === 'pending') return renderDnsSectionVerifying(d);
  if (d.status === 'disconnected') return renderDnsSectionDisconnected(d);
  if (d.status === 'verified') return renderDnsSectionConfigured(d);

  return '';
}

/* Variant: verifying — animated record-by-record progress */
function renderDnsSectionVerifying(d) {
  const p = state.byo.verifyProgress;
  const dkimState = p >= 1 ? 'ok' : (p === 0 ? 'working' : 'pending');
  const rpState = p >= 2 ? 'ok' : (p === 1 ? 'working' : 'pending');
  const dmarcState = p >= 3 ? 'ok' : (p === 2 ? 'working' : 'pending');

  const renderIcon = (st) => {
    if (st === 'ok') return `<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6.5l2.5 2.5L10 3.5"/></svg>`;
    if (st === 'working') return `<div class="spinner" style="border-top-color: var(--info);"></div>`;
    return '';
  };
  const renderLabel = (st) => st === 'ok' ? 'verified just now' : (st === 'working' ? 'checking…' : 'pending');

  return `
    <div class="dns-section" data-state="pending">
      <div class="dns-section-header">
        <span class="dns-section-icon" data-tone="info">
          <div class="spinner" style="width: 12px; height: 12px;"></div>
        </span>
        <span class="dns-section-title">Verifying DNS records</span>
        <span style="margin-left: auto; font-size: 12px; color: var(--text-muted);">${p < 3 ? 'usually 1–5 minutes' : 'all records verified'}</span>
      </div>
      <div class="dns-section-body" style="padding: 0;">
        <div class="verifying-list" style="padding: 4px 0;">
          <div class="verifying-row">
            <div class="verifying-icon" data-state="${dkimState}">${renderIcon(dkimState)}</div>
            <div>
              <div class="label">DKIM signing key</div>
              <div class="desc">TXT record for <code style="font-family:var(--font-mono);font-size:11.5px;">_domainkey.${d.fullDomain.split('.')[0]}</code></div>
            </div>
            <span class="timestamp">${renderLabel(dkimState)}</span>
          </div>
          <div class="verifying-row">
            <div class="verifying-icon" data-state="${rpState}">${renderIcon(rpState)}</div>

/* =========================================================
   DOMAIN DETAIL ACTIONS
   ========================================================= */
function openDomainDetail(id) {
  state.selectedDomainId = id;
  state.pendingEdits = null; // will be lazily initialized in the page
  render();
}

function closeDomainDetail() {
  // If there are unsaved edits, confirm before bailing
  if (state.pendingEdits) {
    const d = state.domains.find(x => x.id === state.pendingEdits.domainId);
    if (d) {
      const dirty = state.pendingEdits.prefix !== d.prefix || state.pendingEdits.displayName !== d.displayName || state.pendingEdits.replyTo !== d.replyTo;
      if (dirty && !confirm('You have unsaved changes. Discard them?')) {
        return;
      }
    }
  }
  // Also cancel any in-flight inline DNS wizard for this domain
  if (state.byo.inlineForDomainId === state.selectedDomainId) {
    state.byo.subStep = null;
    state.byo.inlineForDomainId = null;
    state.byo.isVerifying = false;
  }
  state.selectedDomainId = null;
  state.pendingEdits = null;
  render();
}

function discardDomainEdits() {
  if (!state.pendingEdits) return;
  const d = state.domains.find(x => x.id === state.pendingEdits.domainId);
  if (d) {
    state.pendingEdits = {
      domainId: d.id,
      prefix: d.prefix,
      displayName: d.displayName,
      replyTo: d.replyTo,
    };
  }
  render();
}

function saveDomainEdits() {
  if (!state.pendingEdits) return;
  const d = state.domains.find(x => x.id === state.pendingEdits.domainId);
  if (!d) return;
  d.prefix = state.pendingEdits.prefix;
  d.displayName = state.pendingEdits.displayName;
  d.replyTo = state.pendingEdits.replyTo;
  state.toast = { kind: 'success', text: `${d.fullDomain} sender identity saved.` };
  // Reset pending so the save bar disappears
  state.pendingEdits = {
    domainId: d.id,
    prefix: d.prefix,
    displayName: d.displayName,
    replyTo: d.replyTo,
  };
  render();
  setTimeout(() => { state.toast = null; render(); }, 2400);
}

function renderDisconnectBanners() {
  const disconnected = state.domains.filter(d => d.status === 'disconnected');
  if (disconnected.length === 0) return '';
  return disconnected.map(d => `
    <div class="disconnect-banner">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 22h20L12 2z"/><path d="M12 9v5M12 18h.01"/></svg>

        </div>

  `).join('');
}

function renderDomainRow(d) {
  const pillClass = `status-${d.status}`;
  const pillLabel = d.status === 'verified' ? 'Verified'
    : d.status === 'pending' ? 'Verifying'
    : d.status === 'disconnected' ? 'Disconnected'
    : 'Managed';
  const rowStyle = d.status === 'disconnected' ? 'background: var(--danger-bg); cursor: pointer;' : 'cursor: pointer;';

  // Quick actions live in the row; the row body itself navigates to the detail page.
  // Clicks on action buttons must not bubble up to the row click.
  let actions = '';
  if (d.isManaged) {
    actions = `<span style="font-size:12px; color:var(--text-faint);">Always available</span>`;
  } else {
    const setDefaultBtn = !d.isDefault && d.status === 'verified'
      ? `<button class="icon-btn" onclick="event.stopPropagation(); setDefault('${d.id}')" title="Set as default"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 1l2 5 5 .5-3.7 3.5L13 15l-5-2.5L3 15l1.7-4.5L1 6.5l5-.5z"/></svg></button>`
      : '';
    const removeBtn = `<button class="icon-btn" onclick="event.stopPropagation(); confirmRemove('${d.id}')" title="Remove" style="color:var(--danger);"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4h10M6 4V2.5h4V4M5 4l1 9h4l1-9"/></svg></button>`;
    actions = `<div class="actions">${setDefaultBtn}${removeBtn}</div>`;
  }

  // Compose the per-row "from" line for hover/scan: prefix@fullDomain · displayName
  const senderSummary = `${d.prefix}@${d.fullDomain}`;

  return `
    <tr style="${rowStyle}" onclick="openDomainDetail('${d.id}')">
      <td>
        <div class="domain-name-cell">
          <span class="name" style="${d.isManaged ? 'color: var(--text-muted);' : ''}">
            ${d.fullDomain}
            ${d.isDefault ? '<span class="default-badge">Default</span>' : ''}
          </span>
          <span class="purpose" style="font-family: var(--font-mono); font-size: 11.5px; color: var(--text-muted);">${senderSummary}</span>
          <span class="purpose" style="margin-top: 2px;">${d.purpose} · ${d.displayName}</span>
        </div>
      </td>
      <td><span class="status-pill ${pillClass}">${pillLabel}</span></td>
      <td style="color: var(--text-muted); font-family: var(--font-mono); font-size: 12px;">${d.lastVerified || '—'}</td>
      <td>${actions}</td>
    </tr>
  `;
}

                <div class="label">DKIM signing key</div>
                <div class="desc">TXT record for <code style="font-family:var(--font-mono);font-size:11.5px;">_domainkey.${state.byo.subdomain}</code></div>
              </div>
              <span class="timestamp">${renderLabel(dkimState)}</span>
            </div>
            <div class="verifying-row">
              <div class="verifying-icon" data-state="${rpState}">${renderIcon(rpState)}</div>
              <div>
                <div class="label">Return-Path</div>
                <div class="desc">CNAME for <code style="font-family:var(--font-mono);font-size:11.5px;">pm-bounces.${state.byo.subdomain}</code></div>
              </div>
              <span class="timestamp">${renderLabel(rpState)}</span>
            </div>
            ${state.byo.dmarcOn ? `
              <div class="verifying-row">
                <div class="verifying-icon" data-state="${dmarcState}">${renderIcon(dmarcState)}</div>
                <div>
                  <div class="label">DMARC policy</div>
                  <div class="desc">TXT record for <code style="font-family:var(--font-mono);font-size:11.5px;">_dmarc.${state.byo.subdomain}</code></div>
                </div>
                <span class="timestamp">${renderLabel(dmarcState)}</span>
              </div>` : ''}
          </div>
          <div class="verifying-foot">
            ${p < 3 ? `<div class="spinner"></div><span>You can leave this page — we'll update once verification finishes.</span>` : `<span style="color:var(--success); font-weight:500;">All records verified.</span>`}
          </div>
        </div>
      </div>
      <div style="margin-top: 32px; display: flex; justify-content: flex-end; gap: 16px; padding-top: 24px; border-top: 1px solid var(--border);">
        <button class="btn btn-secondary" onclick="state.byo.isVerifying=false; state.byo.subStep=null; render();">Continue verifying in background</button>
      </div>
    </main>
  `;
}

/* OTHER TABS (placeholder content) */
function placeholderTab(label, body) {
  return `
    ${settingsSidebar()}
    <main class="shell-main">
      <div class="page-header">
        <h1>${label}</h1>
        <p>${body}</p>
      </div>
      <p style="font-size: 13px; color: var(--text-muted);"><em>Demo:</em> this tab uses the existing Engage settings component unchanged. Click <strong>Email Channel</strong> in the sidebar to see the redesigned experience.</p>
    </main>
  `;
}

function entriModalHTML() {
  return `
    <div class="entri-overlay">
      <div class="entri-modal">
        <div class="entri-modal-mark">E</div>
        <h2>This is where Entri's modal would launch</h2>
        <p>In production, Entri's iframe takes over here. The user logs into their DNS provider (Cloudflare, GoDaddy, etc.) and Entri publishes the DKIM, Return-Path, and DMARC records.</p>
        <p style="font-size:12.5px; color:var(--text-muted);">Records being published for <code style="font-family:var(--font-mono);">${state.byo.subdomain}.${state.byo.rootDomain}</code>.</p>
        <div class="entri-modal-actions">
          <button class="btn btn-secondary" onclick="entriClose()">Simulate close</button>
          <button class="btn btn-primary" onclick="entriSuccess()">Simulate success →</button>
        </div>
        <p class="demo-note">Demo only — Entri's real modal is not embedded here.</p>
      </div>
    </div>
  `;
}

function confirmModalHTML() {
  if (!state.confirmModal) return '';
  return `
    <div class="confirm-overlay">
      <div class="confirm-modal">
        <h2>${state.confirmModal.title}</h2>
        <p>${state.confirmModal.body}</p>
        <div class="actions">
          <button class="btn btn-ghost" onclick="state.confirmModal=null; render();">Cancel</button>
          <button class="btn btn-danger" onclick="(${state.confirmModal.onConfirm.toString()})()">${state.confirmModal.confirmLabel}</button>
        </div>
      </div>
    </div>
  `;
}

function toastHTML() {
  if (!state.toast) return '';
  const bg = state.toast.kind === 'success' ? 'var(--success)' : 'var(--info)';
  return `
    <div style="position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: ${bg}; color: white; padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 500; box-shadow: 0 6px 24px rgba(0,0,0,0.18); z-index: 90; animation: fadeIn 180ms ease;">
      ${state.toast.text}
    </div>
  `;
}

function demoSwitcher() {
  const sw = document.getElementById('demoSwitcher');
  sw.innerHTML = DEMO_SCENARIOS.map(s => `
    <button class="${state.demoScenario === s.key ? 'active' : ''}" onclick="loadDemoScenario('${s.key}')">${s.label}</button>
  `).join('');
}

/* =========================================================
   RENDER — with focus preservation across rerenders
   ========================================================= */
function render() {
  const stage = document.getElementById('stage');

  // Capture focus state BEFORE rerender
  const active = document.activeElement;
  let focusKey = null;
  let selStart = null, selEnd = null;
  if (active && active.dataset && active.dataset.focusKey) {
    focusKey = active.dataset.focusKey;
    if (typeof active.selectionStart === 'number') {
      selStart = active.selectionStart;
      selEnd = active.selectionEnd;
    }
  }

  let body;
  if (state.byo.isVerifying) {
    body = `<div class="shell-body" data-mode="byo">${byoSidebar()}${byoVerifyingScreen()}</div>`;
  } else if (state.byo.subStep) {
    let sub;
    if (state.byo.subStep === 'root') sub = byoRootSubstep();
    else if (state.byo.subStep === 'subdomain') sub = byoSubdomainSubstep();
    else if (state.byo.subStep === 'dmarc') sub = byoDmarcSubstep();
    else if (state.byo.subStep === 'connect') sub = byoConnectSubstep();
    body = `<div class="shell-body" data-mode="byo">${byoSidebar()}${sub}</div>`;
  } else {
    let pageContent;
    if (state.tab === 'email-channel') {
      pageContent = state.selectedDomainId
        ? emailChannelDomainDetailPage(state.selectedDomainId)
        : emailChannelPage();
    }
    else if (state.tab === 'brand') pageContent = placeholderTab('Brand Settings', 'Configure your brand colors, tone, and logo for messages.');
    else if (state.tab === 'business') pageContent = placeholderTab('Business Information', 'Update your DBA, address, and contact info. Changes here may trigger SMS re-verification.');
    else if (state.tab === 'sms') pageContent = placeholderTab('SMS Channel', 'Manage your SMS sending number and request approval for new ones.');
    else if (state.tab === 'merge-fields') pageContent = placeholderTab('Merge Fields', 'Manage merge fields used for personalization in email and SMS.');
    body = `<div class="shell-body">${pageContent}</div>`;
  }

  let html = `<div class="shell">${shellHeader()}${body}</div>`;
  if (state.showEntriModal) html += entriModalHTML();
  if (state.confirmModal) html += confirmModalHTML();
  if (state.toast) html += toastHTML();

  stage.innerHTML = html;
  demoSwitcher();

  // Restore focus AFTER rerender
  if (focusKey) {
    const target = stage.querySelector('[data-focus-key="' + focusKey + '"]');
    if (target) {
      target.focus();
      if (selStart !== null && typeof target.setSelectionRange === 'function') {
        try { target.setSelectionRange(selStart, selEnd); } catch (e) { /* ignore */ }
      }
    }
  }
}

render();
</script>

</body>
</html>
